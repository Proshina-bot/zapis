<!DOCTYPE html>
<html>
<head>
    <title>ДИАГНОСТИКА - ПРОСТАЯ ВЕРСИЯ</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        button { padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer; }
        pre { background: #333; color: #0f0; padding: 15px; border-radius: 5px; overflow: auto; max-height: 500px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        table { border-collapse: collapse; width: 100%; }
        td, th { border: 1px solid #ddd; padding: 8px; }
        th { background: #f2f2f2; }
        .section { margin: 20px 0; padding: 15px; border: 2px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔧 ДИАГНОСТИКА - ПРОСТАЯ ВЕРСИЯ</h1>
    
    <div class="section">
        <h2>URL скрипта</h2>
        <input type="text" id="scriptUrl" size="100" value="https://script.google.com/macros/s/AKfycbyZoE2gZFInoAaW3qzM2kfErdZxGEIgXeBZ2D4lR3H-Zy0CKqIWJKBfOCGKTBDvbrVc/exec">
        <button onclick="saveUrl()">Сохранить</button>
        <span id="urlStatus"></span>
    </div>

    <div class="section">
        <h2>1. ПРЯМОЙ ЗАПРОС К СКРИПТУ</h2>
        <button onclick="testDirect()">🔄 Выполнить прямой запрос</button>
        <button onclick="testJsonp()">🔄 JSONP запрос</button>
        <div id="directResult"></div>
    </div>

    <div class="section">
        <h2>2. ПРОВЕРКА ФОРМАТА ДАТ</h2>
        <button onclick="testDateFormat()">📅 Тест конвертации дат</button>
        <div id="dateResult"></div>
    </div>

    <div class="section">
        <h2>3. ТЕСТОВАЯ ЗАПИСЬ</h2>
        <button onclick="addTestRecord()">➕ ДОБАВИТЬ ТЕСТОВУЮ ЗАПИСЬ</button>
        <div id="addResult"></div>
    </div>

    <div class="section">
        <h2>4. ВСЕ ЗАПИСИ (ТАБЛИЦА)</h2>
        <button onclick="showAllRecords()">📊 ПОКАЗАТЬ ВСЕ ЗАПИСИ</button>
        <div id="recordsTable"></div>
    </div>

    <div class="section">
        <h2>5. ДАННЫЕ В ФОРМАТЕ JSON</h2>
        <pre id="jsonData">Нажмите кнопку выше</pre>
    </div>
</div>

<script>
let url = document.getElementById('scriptUrl').value;

function saveUrl() {
    url = document.getElementById('scriptUrl').value;
    document.getElementById('urlStatus').innerHTML = '✅ Сохранено';
    localStorage.setItem('diagnosticUrl', url);
}

// Загружаем сохраненный URL
const saved = localStorage.getItem('diagnosticUrl');
if (saved) {
    url = saved;
    document.getElementById('scriptUrl').value = saved;
}

async function testDirect() {
    const resultDiv = document.getElementById('directResult');
    resultDiv.innerHTML = 'Загрузка...';
    
    try {
        const response = await fetch(url + '?_=' + Date.now());
        const text = await response.text();
        
        let html = '<h3>Результат:</h3>';
        html += '<p>Статус: ' + response.status + '</p>';
        html += '<p>Длина ответа: ' + text.length + ' символов</p>';
        html += '<p>Первые 200 символов:</p>';
        html += '<pre>' + text.substring(0, 200) + '</pre>';
        
        try {
            const data = JSON.parse(text);
            html += '<p class="success">✅ JSON валидный</p>';
            html += '<p>Количество записей: ' + Object.keys(data).length + '</p>';
            document.getElementById('jsonData').textContent = JSON.stringify(data, null, 2);
        } catch(e) {
            html += '<p class="error">❌ Ошибка парсинга JSON: ' + e + '</p>';
        }
        
        resultDiv.innerHTML = html;
    } catch(e) {
        resultDiv.innerHTML = '<p class="error">❌ Ошибка: ' + e + '</p>';
    }
}

function testJsonp() {
    const resultDiv = document.getElementById('directResult');
    resultDiv.innerHTML = 'Загрузка...';
    
    // Удаляем старый скрипт если есть
    const oldScript = document.getElementById('jsonpScript');
    if (oldScript) oldScript.remove();
    
    window.jsonpCallback = function(data) {
        let html = '<h3>JSONP результат:</h3>';
        html += '<p class="success">✅ Данные получены</p>';
        html += '<p>Количество записей: ' + Object.keys(data).length + '</p>';
        html += '<pre>' + JSON.stringify(data, null, 2).substring(0, 500) + '</pre>';
        resultDiv.innerHTML = html;
        document.getElementById('jsonData').textContent = JSON.stringify(data, null, 2);
    };
    
    const script = document.createElement('script');
    script.id = 'jsonpScript';
    script.src = url + '?callback=jsonpCallback&_=' + Date.now();
    document.body.appendChild(script);
}

function testDateFormat() {
    const resultDiv = document.getElementById('dateResult');
    
    const testDates = [
        '2024-03-12',
        'Thu Mar 12 2026 00:00:00 GMT+0500',
        'Sat Dec 30 1899 09:00:00 GMT+0402',
        new Date().toString()
    ];
    
    let html = '<h3>Тест конвертации:</h3><table><tr><th>Исходная</th><th>Парсинг</th><th>Результат</th></tr>';
    
    testDates.forEach(dateStr => {
        const d = new Date(dateStr);
        const isValid = !isNaN(d.getTime());
        let result = '—';
        
        if (isValid) {
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            result = `${year}-${month}-${day} ${hours}:${minutes}`;
        }
        
        html += `<tr>
            <td>${dateStr}</td>
            <td>${isValid ? '✅' : '❌'}</td>
            <td>${result}</td>
        </tr>`;
    });
    
    html += '</table>';
    resultDiv.innerHTML = html;
}

async function addTestRecord() {
    const resultDiv = document.getElementById('addResult');
    resultDiv.innerHTML = 'Добавление...';
    
    const now = new Date();
    const testData = {
        action: 'new',
        branch: 'ryabinina',
        date: now.toISOString().split('T')[0], // YYYY-MM-DD
        time: String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0'),
        car: '1',
        services: 'ТЕСТ',
        size: 'R17',
        carBrand: 'TESTCAR',
        clientName: 'ТЕСТОВЫЙ КЛИЕНТ',
        phone: '+7 999 999-99-99',
        comment: 'Тест ' + now.toLocaleTimeString()
    };
    
    const params = new URLSearchParams(testData);
    const fullUrl = url + '?' + params.toString() + '&_=' + Date.now();
    
    try {
        const response = await fetch(fullUrl);
        const text = await response.text();
        
        let html = '<h3>Результат добавления:</h3>';
        html += '<p>URL: ' + fullUrl + '</p>';
        html += '<p>Статус: ' + response.status + '</p>';
        html += '<p>Ответ: ' + text.substring(0, 200) + '</p>';
        resultDiv.innerHTML = html;
        
        // Показываем обновленные данные
        setTimeout(showAllRecords, 1000);
    } catch(e) {
        resultDiv.innerHTML = '<p class="error">❌ Ошибка: ' + e + '</p>';
    }
}

async function showAllRecords() {
    const tableDiv = document.getElementById('recordsTable');
    const jsonDiv = document.getElementById('jsonData');
    tableDiv.innerHTML = 'Загрузка...';
    
    try {
        const response = await fetch(url + '?_=' + Date.now());
        const data = await response.json();
        
        jsonDiv.textContent = JSON.stringify(data, null, 2);
        
        if (Object.keys(data).length === 0) {
            tableDiv.innerHTML = '<p class="warning">⚠️ Записей нет</p>';
            return;
        }
        
        let html = '<table><tr><th>Ключ</th><th>Филиал</th><th>Дата</th><th>Время</th><th>Место</th><th>Марка</th><th>Имя</th></tr>';
        
        Object.entries(data).forEach(([key, val]) => {
            const [branch, date, time, car] = key.split('_');
            
            // Пробуем отформатировать дату
            let displayDate = date;
            let displayTime = time;
            
            try {
                const d = new Date(date);
                if (!isNaN(d.getTime())) {
                    displayDate = d.getFullYear() + '-' + 
                                 String(d.getMonth()+1).padStart(2,'0') + '-' + 
                                 String(d.getDate()).padStart(2,'0');
                }
            } catch(e) {}
            
            try {
                const t = new Date(time);
                if (!isNaN(t.getTime())) {
                    displayTime = String(t.getHours()).padStart(2,'0') + ':' + 
                                  String(t.getMinutes()).padStart(2,'0');
                }
            } catch(e) {}
            
            html += `<tr>
                <td>${key}</td>
                <td>${branch}</td>
                <td>${displayDate}</td>
                <td>${displayTime}</td>
                <td>${car}</td>
                <td>${val.carBrand || '—'}</td>
                <td>${val.clientName || '—'}</td>
            </tr>`;
        });
        
        html += '</table>';
        tableDiv.innerHTML = html;
        
    } catch(e) {
        tableDiv.innerHTML = '<p class="error">❌ Ошибка: ' + e + '</p>';
    }
}
</script>
</body>
</html>
